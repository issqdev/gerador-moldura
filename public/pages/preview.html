<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Molduras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Varela+Round&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/preview.css">
    <script src="../js/previewController.js" defer></script>
</head>

<body>
    <header class="header">
        <div class="header-content">
            <div class="grupo-1">
                <button id="backBtn" class="btn btn-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-arrow-left w-4 h-4 mr-2" aria-hidden="true">
                        <path d="m12 19-7-7 7-7"></path>
                        <path d="M19 12H5"></path>
                    </svg>
                    Voltar</button>
                <div class="logo">
                    <div class="logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="black"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-camera w-4 h-4 text-primary-foreground" aria-hidden="true">
                            <path
                                d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z">
                            </path>
                            <circle cx="12" cy="13" r="3"></circle>
                        </svg>
                    </div>
                    <h1>Editor de Molduras</h1>
                </div>
            </div>

            <div class="progress-section">
                <span id="stepText">Etapa 3 de 3 - Finalizar</span>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill progress-fill--step-3"></div>
                </div>
            </div>
            
            <svg width="56" height="70" viewBox="195.2 121.2 159.7 140.7">
                <g fill="#FFFFFF" fill-opacity="0.85" fill-rule="evenodd"
                    data-paper-data="{&quot;fillRule&quot;:&quot;evenodd&quot;,&quot;fillRuleOriginal&quot;:&quot;evenodd&quot;,&quot;isIcon&quot;:true,&quot;iconStyle&quot;:&quot;standalone&quot;,&quot;selectedEffects&quot;:{&quot;container&quot;:&quot;&quot;,&quot;transformation&quot;:&quot;&quot;,&quot;pattern&quot;:&quot;&quot;},&quot;bounds&quot;:{&quot;x&quot;:195.17388731240706,&quot;y&quot;:121.20291346921113,&quot;width&quot;:159.6522253751859,&quot;height&quot;:140.65838326828992},&quot;iconType&quot;:&quot;icon&quot;,&quot;isDetailed&quot;:false,&quot;source&quot;:&quot;ai&quot;,&quot;rawIconId&quot;:&quot;kd8LqEIeOstzXGJT3Fo0DWP294LZ62QSJk6z1iavXQ&quot;,&quot;suitableAsStandaloneIcon&quot;:true}">
                    <path
                        d="m263 127 5-4q3-3 4-1 2 2-1 6-6 6-24 7c-8 1-10 0-26-3l-13-2h-2v4c0 5 0 8 3 18l1 15a32 32 0 0 1-6 22l-2 3 2 2 5 11 1 11-2 18-2 15-1 4h4l15-3q23-5 36 0 12 4 13 10l-1 2-4-2q-4-5-15-5c-6 0-7 0-17 3l-11 3-28 1v-12c0-14 0-15 3-27 2-8 3-9 3-15q1-9-5-13l-3-4 3-4q6-5 5-13l-5-19-1-19v-14h10c13 0 17 0 29 3 10 3 10 3 17 3zm22 5q-9-5-7-10l5 2 9 4q7 1 16-1c19-5 21-5 35-5h10l1 1-1 26-3 12c-4 14-4 20 2 26q6 5 1 7-9 7-3 28c3 10 3 13 4 27v13l-14-1h-15l-16-4q-6-2-12-2c-8 0-10 1-14 4q-4 4-5 2c-4-3 5-10 16-12l13-1 20 2 14 3h4v-1l-3-19q-5-23 2-35l3-5 2-1-2-3q-7-8-7-22l2-18q4-18 2-19l-17 3c-13 2-17 3-24 2q-11 0-18-3m-72 114V137h124v109zm6-5v-98h113v98zm18-44c-4-19 9-38 29-43 5-2 16-1 21 0q19 8 25 26 8 23-12 41a38 38 0 0 1-46 3q-11-7-15-19zm8-14q7-16 22-21h16q15 4 21 19 3 9 1 18a31 31 0 0 1-41 21q-13-5-18-20-3-8-1-17m11-9q7-8 15-8h8l8 2c16 8 19 29 6 42q-4 6-11 7h-13a26 26 0 0 1-13-43m11 36c-18-8-16-34 3-39h9q10 2 15 12l1 9-1 8c-5 11-17 15-27 10"
                        data-paper-data="{&quot;isPathIcon&quot;:true}" />
                </g>
            </svg>
        </div>
    </header>

    <!-- Etapa 3 - Ajustes e Preview -->
    <main>
        <section id="step3" class="step">
            <div class="container">
                <div class="step-title">
                    <h2>Ajuste Final</h2>
                    <p>Faça os ajustes finais e baixe sua foto emoldurada</p>
                </div>
    
                <div class="canvas-section">
                    <section class="canvas-container">
                        <div class="canvas-header">
                            <h4><svg xmlns="http://www.w3.org/2000/svg" width="18" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="lucide lucide-move w-5 h-5" aria-hidden="true">
                                    <path d="M12 2v20"></path>
                                    <path d="m15 19-3 3-3-3"></path>
                                    <path d="m19 9 3 3-3 3"></path>
                                    <path d="M2 12h20"></path>
                                    <path d="m5 9-3 3 3 3"></path>
                                    <path d="m9 5 3-3 3 3"></path>
                                </svg>Preview da Foto
                            </h4>
                        </div>
                        <canvas id="previewCanvas" width="400" height="400"></canvas>
                        <div class="selected-frame-info">
                            <strong>Moldura:</strong> <span id="selectedFrameName"></span>
                        </div>
                    </section>
    
                    <div class="controls-section">
                        <section class="control-group">
                            <h3><svg width="18" height="20" fill="black" viewBox="0 0 24 24" stroke="black">
                                    <path fill="var(--color-icon)" fill-rule="evenodd"
                                        d="M17.287 6.044c-.561.24-1.22.22-1.787-.106a2 2 0 0 1-.986-1.495c-.07-.576-.495-1.253-1.297-1.361a9 9 0 0 0-2.434 0c-.802.108-1.228.785-1.297 1.36A2 2 0 0 1 8.5 5.939a2 2 0 0 1-1.787.106c-.533-.227-1.33-.197-1.826.44a9 9 0 0 0-1.22 2.111c-.307.749.067 1.456.53 1.803.49.367.803.948.803 1.602s-.313 1.235-.802 1.602c-.464.347-.838 1.054-.531 1.803.311.761.724 1.47 1.22 2.11.495.638 1.293.668 1.826.44a2 2 0 0 1 1.787.107c.566.327.913.889.986 1.495.07.576.495 1.253 1.297 1.361a9 9 0 0 0 2.434 0c.802-.108 1.227-.785 1.297-1.36.073-.607.42-1.169.986-1.496a2 2 0 0 1 1.787-.106c.533.227 1.33.197 1.826-.44.496-.64.909-1.35 1.22-2.111.307-.749-.067-1.456-.53-1.803A2 2 0 0 1 19 12c0-.654.313-1.235.802-1.602.464-.347.838-1.054.531-1.803a9 9 0 0 0-1.22-2.11c-.495-.638-1.293-.668-1.826-.44m-3.766-1.481c.11.905.628 1.75 1.479 2.24a2.99 2.99 0 0 0 2.68.161c.224-.096.493-.058.643.134.442.57.808 1.2 1.085 1.876.092.226-.01.478-.206.624A3 3 0 0 0 18 12c0 .983.472 1.855 1.203 2.402.195.146.297.398.205.624a8 8 0 0 1-1.085 1.876c-.15.192-.419.23-.643.134a3 3 0 0 0-2.68.16 3 3 0 0 0-1.479 2.241c-.03.243-.196.458-.438.49a8 8 0 0 1-2.166 0c-.242-.032-.409-.247-.438-.49A3 3 0 0 0 9 17.197a3 3 0 0 0-2.68-.161c-.224.096-.493.058-.643-.134a8 8 0 0 1-1.085-1.876c-.092-.226.01-.478.205-.624A3 3 0 0 0 6 12c0-.983-.472-1.855-1.203-2.402-.195-.146-.297-.398-.205-.624a8 8 0 0 1 1.085-1.876c.15-.192.419-.23.643-.134.839.358 1.83.33 2.68-.16a3 3 0 0 0 1.479-2.241c.03-.243.196-.458.438-.49a8 8 0 0 1 2.166 0c.242.032.409.247.438.49M14 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0m1 0a3 3 0 1 1-6 0 3 3 0 0 1 6 0"
                                        clip-rule="evenodd"></path>
                                </svg>
                                Ajustes da Imagem</h3>
                            <div class="slider-container">
                                <label for="scaleSlider">Tamanho: <span id="scaleValue">100%</span></label>
                                <div class="size-bar">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" class="lucide lucide-zoom-out w-4 h-4" aria-hidden="true">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" x2="16.65" y1="21" y2="16.65"></line>
                                        <line x1="8" x2="14" y1="11" y2="11"></line>
                                    </svg>
                                    <input type="range" id="scaleSlider" class="slider" min="50" max="200" value="100">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" class="lucide lucide-zoom-in w-4 h-4" aria-hidden="true">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" x2="16.65" y1="21" y2="16.65"></line>
                                        <line x1="11" x2="11" y1="8" y2="14"></line>
                                        <line x1="8" x2="14" y1="11" y2="11"></line>
                                    </svg>
                                </div>
                            </div>
                            <div class="slider-container">
                                <label for="rotateSlider">Rotação: <span id="rotateValue">0°</span></label>
                                <input type="range" id="rotateSlider" class="slider" min="-180" max="180" value="0">
                            </div>
                            <button id="resetBtn" class="btn btn-secondary full-width"><svg
                                    xmlns="http://www.w3.org/2000/svg" width="18" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="lucide lucide-rotate-ccw w-4 h-4 mr-2"
                                    aria-hidden="true">
                                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                    <path d="M3 3v5h5"></path>
                                </svg>
                                Resetar Ajustes</button>
                        </section>
    
                        <section class="control-group">
                            <h3>Configurações de Download</h3>
                            <div class="download-field">
                                <label for="sizeSelect">Tamanho:</label>
                                <select id="sizeSelect" class="select">
                                    <option value="512">512x512 (Pequena)</option>
                                    <option value="1024" selected>1024x1024 (Média)</option>
                                    <option value="2048">2048x2048 (Grande)</option>
                                </select>
                            </div>
                            <div class="download-field download-field--spacious">
                                <label for="formatSelect">Formato:</label>
                                <select id="formatSelect" class="select">
                                    <option value="png">PNG (Melhor qualidade)</option>
                                    <option value="jpg">JPG (Menor arquivo)</option>
                                </select>
                            </div>
                            <button id="downloadBtn" class="btn btn-secondary full-width download-action">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="lucide lucide-upload w-4 h-4 mr-2" aria-hidden="true">
                                    <path d="M12 3v12"></path>
                                    <path d="m17 8-5-5-5 5"></path>
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                </svg>
                                Baixar Imagem
                            </button>
                        </section>
    
                        <button id="startOverBtn" class="btn btn-outline full-width download-action">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                class="lucide lucide-rotate-ccw w-4 h-4 mr-2" aria-hidden="true">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                <path d="M3 3v5h5"></path>
                            </svg>
                            Começar Novamente
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
